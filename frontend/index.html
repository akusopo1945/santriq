<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SantriQ - LMS Madrasah Diniyah</title>
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* DESIGN SYSTEM - TOKENS FROM DESIGN.md */
    :root {
      --primary: #15803d;
      --primary-light: #dcfce7;
      --primary-dark: #14532d;
      --secondary: #0284c7;
      --secondary-light: #e0f2fe;
      --background: #f8fafc;
      --surface: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --success: #16a34a;
      --warning: #eab308;
      --danger: #dc2626;

      --welcome-primary: var(--primary-dark);
      --welcome-secondary: var(--secondary);

      --font-heading: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;

      --rounded-sm: 4px;
      --rounded-md: 8px;
      --rounded-lg: 12px;
      --rounded-xl: 16px;

      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;

      --shadow-soft: 0px 4px 6px -1px rgba(0, 0, 0, 0.05), 0px 2px 4px -2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0px 10px 15px -3px rgba(0, 0, 0, 0.05), 0px 4px 6px -4px rgba(0, 0, 0, 0.05);
    }

    /* DARK MODE TOKENS */
    body.dark-theme {
      --background: #0f172a;
      --surface: #1e293b;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border: #334155;
      --secondary: #38bdf8;
      --secondary-light: #0c4a6e;
      --primary-light: #14532d; /* Deep forest green active background */
      --primary-dark: #4ade80;  /* Bright neon green headers */
      --shadow-soft: 0px 4px 6px -1px rgba(0, 0, 0, 0.2), 0px 2px 4px -2px rgba(0, 0, 0, 0.2);
      --shadow-md: 0px 10px 15px -3px rgba(0, 0, 0, 0.3), 0px 4px 6px -4px rgba(0, 0, 0, 0.3);

      --welcome-primary: #ffffff;
      --welcome-secondary: #ffffff;
    }

    body.dark-theme .brand {
      color: var(--text-primary);
    }

    body.dark-theme .brand i {
      color: var(--primary-dark) !important;
    }

    body.dark-theme .logout-btn:hover {
      background-color: #7f1d1d;
    }

    body.dark-theme .btn-secondary {
      background-color: #ffffff !important; /* white background */
      color: #0f172a !important; /* dark text for contrast */
      border: 1px solid var(--secondary) !important;
    }

    body.dark-theme .btn-secondary:hover {
      background-color: var(--secondary) !important;
      color: #0f172a !important;
    }

    body.dark-theme .btn-danger {
      background-color: #7f1d1d !important;
      color: #fee2e2 !important;
      border: 1px solid var(--danger) !important;
    }

    body.dark-theme .btn-danger:hover {
      background-color: var(--danger) !important;
      color: #ffffff !important;
    }

    /* VIEW TRANSITION CIRCULAR REVEAL EFFECT */
    ::view-transition-image-pair(root) {
      isolation: auto;
    }

    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
      display: block;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--background);
      color: var(--text-primary);
      line-height: 1.5;
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-heading);
      font-weight: 700;
    }

    /* UTILITY CLASSES */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: var(--spacing-sm) var(--spacing-md);
      font-size: 14px;
      font-weight: 600;
      border-radius: var(--rounded-md);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-body);
    }

    .btn-primary {
      background-color: var(--primary);
      color: #ffffff;
    }

    .btn-primary:hover {
      background-color: var(--primary-dark);
    }

    .btn-secondary {
      background-color: var(--secondary-light);
      color: var(--secondary);
    }

    .btn-secondary:hover {
      filter: brightness(0.95);
    }

    .btn-danger {
      background-color: #fee2e2;
      color: var(--danger);
    }

    .btn-danger:hover {
      background-color: var(--danger);
      color: var(--surface);
    }

    .card {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--rounded-md);
      padding: var(--spacing-md);
      box-shadow: var(--shadow-soft);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
      border-radius: var(--rounded-sm);
    }

    .badge-success { background-color: var(--primary-light); color: var(--primary-dark); }
    .badge-warning { background-color: #fef9c3; color: var(--warning); }
    .badge-danger { background-color: #fee2e2; color: var(--danger); }
    .badge-info { background-color: var(--secondary-light); color: var(--secondary); }

    /* LAYOUT: LOGIN PAGE */
    #login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--primary-light) 0%, #f0fdf4 100%);
      padding: var(--spacing-md);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background-color: var(--surface);
      border-radius: var(--rounded-xl);
      box-shadow: var(--shadow-md);
      padding: var(--spacing-xl);
      border: 1px solid var(--border);
    }

    .login-header {
      text-align: center;
      margin-bottom: var(--spacing-lg);
    }

    .login-header h1 {
      color: var(--primary-dark);
      font-size: 28px;
      margin-top: var(--spacing-xs);
    }

    .login-header p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: var(--spacing-md);
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: var(--spacing-xs);
    }

    .form-control {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: var(--rounded-md);
      outline: none;
      transition: border-color 0.2s, background-color 0.2s, color 0.2s;
      font-family: var(--font-body);
      background-color: var(--surface);
      color: var(--text-primary);
    }

    .form-control:focus {
      border-color: var(--primary);
    }

    /* LAYOUT: APP SHELL (SIDEBAR & MAIN CONTENT) */
    #app-shell {
      display: none;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 260px;
      background-color: var(--surface);
      border-right: 1px solid var(--border);
      padding: var(--spacing-lg);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar-toggle-btn {
      position: absolute;
      right: -14px;
      top: 24px;
      background-color: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: all 0.2s ease;
      z-index: 110;
    }

    .sidebar-toggle-btn:hover {
      background-color: var(--primary-light);
      color: var(--primary-dark);
      border-color: var(--primary);
      transform: scale(1.1);
    }

    /* COLLAPSIBLE SIDEBAR STYLES */
    #app-shell.sidebar-collapsed .sidebar {
      width: 80px;
      padding: var(--spacing-lg) var(--spacing-sm);
      align-items: center;
    }

    #app-shell.sidebar-collapsed .main-container {
      margin-left: 80px;
    }

    #app-shell.sidebar-collapsed .brand {
      justify-content: center;
      gap: 0;
      width: 100%;
    }

    #app-shell.sidebar-collapsed .brand-text,
    #app-shell.sidebar-collapsed .nav-item a span,
    #app-shell.sidebar-collapsed .user-info {
      display: none !important;
    }

    #app-shell.sidebar-collapsed .nav-list {
      width: 100%;
      align-items: center;
    }

    #app-shell.sidebar-collapsed .nav-item {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    #app-shell.sidebar-collapsed .nav-item a {
      width: 48px;
      height: 48px;
      padding: 0;
      justify-content: center;
      gap: 0;
      border-radius: var(--rounded-md);
    }

    #app-shell.sidebar-collapsed .sidebar-footer {
      width: 100%;
      justify-content: center;
      padding-top: var(--spacing-md);
    }

    #app-shell.sidebar-collapsed .logout-btn {
      width: 40px;
      height: 40px;
      padding: 0;
      justify-content: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--primary-dark);
      margin-bottom: var(--spacing-xl);
      position: relative;
    }

    .brand h2 {
      font-size: 22px;
    }

    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-grow: 1;
    }

    .nav-item a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--rounded-md);
      transition: all 0.2s ease;
    }

    .nav-item a:hover, .nav-item.active a {
      background-color: var(--primary-light);
      color: var(--primary-dark);
      font-weight: 600;
    }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding-top: var(--spacing-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-info {
      display: flex;
      flex-direction: column;
    }

    .user-name {
      font-size: 14px;
      font-weight: 600;
    }

    .user-role {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .logout-btn {
      color: var(--danger);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 6px;
      border-radius: var(--rounded-sm);
    }

    .logout-btn:hover {
      background-color: #fee2e2;
    }

    .main-container {
      margin-left: 260px;
      padding: var(--spacing-xl);
      padding-top: 80px;
      min-height: 100vh;
      transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-xl);
    }

    .page-title h1 {
      font-size: 28px;
      color: var(--text-primary);
    }

    .page-title p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* GRID CONTROLLERS */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-xl);
    }

    .stat-card {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }

    .stat-icon {
      width: 50px;
      height: 50px;
      border-radius: var(--rounded-md);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stat-icon.primary { background-color: var(--primary-light); color: var(--primary); }
    .stat-icon.secondary { background-color: var(--secondary-light); color: var(--secondary); }
    .stat-icon.warning { background-color: #fef9c3; color: var(--warning); }

    .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* TABLE LAYOUT */
    .table-container {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--rounded-md);
      box-shadow: var(--shadow-soft);
      overflow-x: auto;
      margin-bottom: var(--spacing-xl);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 14px;
    }

    th {
      background-color: var(--background);
      padding: 12px 16px;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
    }

    tr:last-child td {
      border-bottom: none;
    }

    /* MODAL DESIGN */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(15, 23, 42, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background-color: var(--surface);
      border-radius: var(--rounded-xl);
      box-shadow: var(--shadow-md);
      width: 100%;
      max-width: 500px;
      padding: var(--spacing-lg);
      transform: translateY(-20px);
      transition: transform 0.2s ease;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal.active .modal-content {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-md);
      border-bottom: 1px solid var(--border);
      padding-bottom: var(--spacing-sm);
    }

    .modal-title {
      font-size: 18px;
      color: var(--text-primary);
    }

    .close-modal {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: var(--spacing-lg);
    }

    /* TOAST NOTIFICATIONS */
    .toast-container {
      position: fixed;
      bottom: var(--spacing-lg);
      right: var(--spacing-lg);
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--primary);
      padding: 12px 20px;
      border-radius: var(--rounded-md);
      box-shadow: var(--shadow-md);
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .toast.active {
      transform: translateX(0);
    }

    .toast.error {
      border-left-color: var(--danger);
    }

    .toast.success {
      border-left-color: var(--success);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .ai-tab-btn:hover {
      color: var(--primary) !important;
      background: var(--primary-light) !important;
    }

    /* ── SPLASH SCREEN ─────────────────────────────────── */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(145deg, #1e3a5f 0%, #0f6b5e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #splash-screen.hide {
      opacity: 0;
      visibility: hidden;
    }
    .splash-logo-ring {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      position: relative;
      animation: splashPulse 2s ease-in-out infinite;
    }
    .splash-logo-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      animation: splashRing 2s ease-in-out infinite;
    }
    .splash-logo-ring::after {
      content: '';
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      animation: splashRing 2s ease-in-out infinite 0.3s;
    }
    @keyframes splashPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    @keyframes splashRing {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 0.15; }
    }
    .splash-title {
      font-size: 36px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .splash-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 40px;
      letter-spacing: 0.5px;
    }
    .splash-bar-wrap {
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      overflow: hidden;
    }
    .splash-bar {
      height: 100%;
      width: 0%;
      background: #ffffff;
      border-radius: 999px;
      transition: width 0.4s ease;
    }
    .splash-dots {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    .splash-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      animation: dotBounce 1.4s ease-in-out infinite;
    }
    .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
    .splash-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.7); background: rgba(255,255,255,0.3); }
      40% { transform: scale(1.1); background: rgba(255,255,255,0.9); }
    }

    /* ── LOGIN BUTTON LOADING STATE ─────────────────────── */
    .btn-login-loading {
      position: relative;
      pointer-events: none;
      opacity: 0.85;
    }

    /* ── APP SHELL ENTRY ANIMATION ──────────────────────── */
    #app-shell {
      animation: none;
    }
    #app-shell.entered {
      animation: appFadeIn 0.4s ease forwards;
    }
    @keyframes appFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── NOTIFICATION DROPDOWN ─────────────────────────── */
    .notif-dropdown {
      position: fixed;
      top: 68px;
      right: 72px;
      width: 360px;
      max-height: 480px;
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--rounded-lg);
      box-shadow: var(--shadow-md);
      display: none;
      flex-direction: column;
      z-index: 1000;
      overflow: hidden;
      animation: notifSlideIn 0.2s ease forwards;
    }
    @keyframes notifSlideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .notif-dropdown.active {
      display: flex;
    }
    /* ── PROFILE DROPDOWN ─────────────────────────── */
    .profile-dropdown {
      position: fixed;
      top: 68px;
      right: 128px;
      width: 320px;
      max-height: 520px;
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--rounded-lg);
      box-shadow: var(--shadow-md);
      display: none;
      flex-direction: column;
      z-index: 1000;
      overflow-y: auto;
      animation: notifSlideIn 0.2s ease forwards;
    }
    .profile-dropdown.active {
      display: flex;
    }
    .notif-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-md);
      border-bottom: 1px solid var(--border);
    }
    .notif-header h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .notif-header button {
      background: none;
      border: none;
      color: var(--secondary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
    }
    .notif-header button:hover {
      text-decoration: underline;
    }
    .notif-body {
      overflow-y: auto;
      flex-grow: 1;
      max-height: 380px;
    }
    .notif-item {
      display: flex;
      gap: 12px;
      padding: var(--spacing-md);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background-color 0.2s ease;
      position: relative;
    }
    .notif-item:hover {
      background-color: var(--background);
    }
    .notif-item.unread {
      background-color: var(--primary-light);
    }
    body.dark-theme .notif-item.unread {
      background-color: rgba(21, 128, 61, 0.15);
    }
    .notif-icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;

    .notif-icon-wrap.tugas { background-color: var(--secondary-light); color: var(--secondary); }
    .notif-icon-wrap.nilai { background-color: #fef9c3; color: var(--warning); }
    .notif-icon-wrap.absensi { background-color: #fee2e2; color: var(--danger); }
    .notif-icon-wrap.progres { background-color: var(--primary-light); color: var(--primary); }
    .notif-icon-wrap.info { background-color: var(--border); color: var(--text-secondary); }
    
    .notif-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-grow: 1;
    }
    .notif-item-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .notif-item-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    .notif-item-time {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .notif-empty {
      padding: var(--spacing-xl) var(--spacing-md);
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
    }

    /* RESPONSIVE LAYOUT (MOBILE FIRST DETECTOR) */
    @media (max-width: 768px) {
      .sidebar {
        left: 0;
        width: 260px;
        box-shadow: 4px 0 15px rgba(0, 0, 0, 0.15);
        transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1000; /* Layer paling atas */

      /* When collapsed on mobile, DO NOT hide. Shrink to 80px */
      #app-shell.sidebar-collapsed .sidebar {
        width: 80px;
        padding: var(--spacing-lg) var(--spacing-sm);
        align-items: center;

      /* Adjust main container left margin to match 80px sidebar width */
      .main-container,
      #app-shell.sidebar-collapsed .main-container {
        margin-left: 80px !important;
        padding: var(--spacing-md) !important;
        padding-top: 80px !important;
        transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Hiding brand text, nav label, user-info when collapsed */
      #app-shell.sidebar-collapsed .brand {
        justify-content: center;
        gap: 0;
        width: 100%;
      }

      #app-shell.sidebar-collapsed .brand-text,
      #app-shell.sidebar-collapsed .nav-item a span,
      #app-shell.sidebar-collapsed .user-info {
        display: none !important;

      #app-shell.sidebar-collapsed .nav-list {
        width: 100%;
        align-items: center;
      }

      #app-shell.sidebar-collapsed .nav-item {
        width: 100%;
        display: flex;
        justify-content: center;

      #app-shell.sidebar-collapsed .nav-item a {
        width: 48px;
        height: 48px;
        padding: 0;
        justify-content: center;
        gap: 0;
        border-radius: var(--rounded-md);

      #app-shell.sidebar-collapsed .sidebar-footer {

      /* Floating circular toggle button stays on the border */

      /* Page headers */

</head>

  <!-- APP LOGIC & VIEWS ROUTING -->
  <script>
    const API_BASE = (window.Capacitor || window.location.origin.startsWith('file:') || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'https://santriq.13.55.3.99.sslip.io/api'
      : '/api';
    let currentUser = null;
    let systemSettings = null;

    async function loadSystemSettings() {
      try {
        const res = await fetch(`${API_BASE}/system-settings`);
        if (!res.ok) throw new Error();
        systemSettings = await res.json();
        
        // Update document title
        document.title = `${systemSettings.institutionName} - LMS`;

        // Update brand text elements
        document.querySelectorAll('.brand-text').forEach(el => {
          el.innerText = systemSettings.institutionName;
        });

        // Update brand logo elements
        if (systemSettings.logoUrl) {
          let logoUrl = systemSettings.logoUrl;
          if (logoUrl && logoUrl.startsWith('/')) {
            logoUrl = 'https://santriq.13.55.3.99.sslip.io' + logoUrl;
          }
          
          const splashLogo = document.getElementById('splash-logo-container');
          if (splashLogo) {
            splashLogo.innerHTML = `<img src="${logoUrl}" style="width: 48px; height: 48px; object-fit: contain; border-radius: 50%;">`;
          }
          
          const loginLogo = document.getElementById('login-logo-container');
          if (loginLogo) {
            loginLogo.innerHTML = `<img src="${logoUrl}" style="width: 100%; height: 100%; object-fit: contain;">`;
          }
          
          const sidebarLogo = document.getElementById('sidebar-logo-container');
          if (sidebarLogo) {
            sidebarLogo.innerHTML = `<img src="${logoUrl}" style="width: 100%; height: 100%; object-fit: contain; border-radius: 4px;">`;
          }
        }
      } catch (err) {
        console.error('Failed to load system settings:', err);
      }
    }

    // Toast triggers
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" style="width: 20px; height: 20px;"></i>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      lucide.createIcons();

      // Trigger animation
      setTimeout(() => toast.classList.add('active'), 50);
      
      // Auto remove
      setTimeout(() => {
        toast.classList.remove('active');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // --- Navigation Helpers (Best‑practice simple hash router) ---
    function navigateTo(route) {
      window.location.hash = route; // e.g. '#/users'
      loadViewFromHash();
    }

    function loadViewFromHash() {
      const hash = window.location.hash.slice(2); // remove "#/"
      const container = document.getElementById('page-content');
      if (!hash) {
        renderDashboard(container);
        return;
      }
      // Simple route handling – extend as needed
      if (hash === 'users') {
        renderUserList(container);
      } else if (hash === 'classes') {
        renderClassList(container);
      } else if (hash === 'guru') {
        renderGuruList(container);
      } else {
        renderDashboard(container);
      }
    }

    // Listen for hash changes (Back/Forward navigation)
    window.addEventListener('hashchange', loadViewFromHash);

    // Modal helpers
    function openModal(title, fieldsHTML, onSubmit, isMultipart = false) {
      document.getElementById('modal-title-text').innerText = title;
      document.getElementById('modal-fields').innerHTML = fieldsHTML;
      document.getElementById('common-modal').classList.add('active');
      lucide.createIcons();

      const form = document.getElementById('modal-form');
      
      // Handle file uploads properly if multipart form
      if (isMultipart) {
        form.setAttribute('enctype', 'multipart/form-data');
      } else {
        form.removeAttribute('enctype');
      }

      form.onsubmit = async (e) => {
        e.preventDefault();
        if (isMultipart) {
          const formData = new FormData(form);
          await onSubmit(formData, form);
        } else {
          const formData = new FormData(form);
          const data = {};
          formData.forEach((value, key) => data[key] = value);
          await onSubmit(data, form);
        }
      };
    }

    function closeModal() {
      document.getElementById('common-modal').classList.remove('active');
      document.getElementById('modal-form').reset();
    }

    document.getElementById('close-modal-btn').onclick = closeModal;
    document.getElementById('modal-cancel-btn').onclick = closeModal;

    // --- Notification Helpers & Polling ---
    let notifInterval = null;

    function formatRelativeTime(dateString) {
      const now = new Date();
      const date = new Date(dateString);
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      if (diffMins < 1) return 'Baru saja';
      if (diffMins < 60) return `${diffMins} menit lalu`;
      const diffHours = Math.floor(diffMins / 60);
      if (diffHours < 24) return `${diffHours} jam lalu`;
      const diffDays = Math.floor(diffHours / 24);
      return `${diffDays} hari lalu`;
    }

    async function fetchNotifications() {
      const token = localStorage.getItem('token');
      if (!token) return;
      try {
        const response = await fetch(`${API_BASE}/notifications`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error();
        const list = await response.json();
        const container = document.getElementById('notif-list-container');
        container.innerHTML = '';
        
        if (list.length === 0) {
          container.innerHTML = '<div class="notif-empty">Tidak ada notifikasi baru</div>';
          return;
        }
        
        list.forEach(notif => {
          const item = document.createElement('div');
          item.className = `notif-item ${notif.isRead ? '' : 'unread'}`;
          
          let icon = 'info';
          if (notif.type === 'tugas') icon = 'book-open';
          else if (notif.type === 'nilai') icon = 'award';
          else if (notif.type === 'absensi') icon = 'calendar';
          else if (notif.type === 'progres') icon = 'bar-chart';
          
          item.innerHTML = `
            <div class="notif-icon-wrap ${notif.type}">
              <i data-lucide="${icon}" style="width: 18px; height: 18px;"></i>
            </div>
            <div class="notif-content">
              <span class="notif-item-title">${notif.title}</span>
              <span class="notif-item-desc">${notif.message}</span>
              <span class="notif-item-time">${formatRelativeTime(notif.createdAt)}</span>
            </div>
          `;
          
          item.onclick = async () => {
            if (!notif.isRead) {
              await markNotificationAsRead(notif.id);
            }
            document.getElementById('notif-dropdown').classList.remove('active');
            if (notif.type === 'tugas' || notif.type === 'nilai') {
              loadView('assignments');
            } else if (notif.type === 'absensi') {
              loadView('attendance');
            } else if (notif.type === 'progres') {
              loadView('ummi-progress');
            }
          };
          
          container.appendChild(item);
        });
        
        lucide.createIcons();
      } catch (err) {
        console.error('Failed to fetch notifications:', err);
      }
    }

    async function updateUnreadCount() {
      const token = localStorage.getItem('token');
      if (!token) return;
      try {
        const response = await fetch(`${API_BASE}/notifications/unread-count`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error();
        const data = await response.json();
        const badge = document.getElementById('notif-badge');
        if (data.count > 0) {
          badge.innerText = data.count > 99 ? '99+' : data.count;
          badge.style.display = 'flex';
        } else {
          badge.style.display = 'none';
        }
      } catch (err) {
        console.error('Failed to update unread count:', err);
      }
    }

    async function markNotificationAsRead(id) {
      const token = localStorage.getItem('token');
      if (!token) return;
      try {
        const response = await fetch(`${API_BASE}/notifications/${id}/read`, {
          method: 'PATCH',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error();
        await updateUnreadCount();
      } catch (err) {
        console.error('Failed to mark notification as read:', err);
      }
    }

    async function markAllNotificationsAsRead() {
      const token = localStorage.getItem('token');
      if (!token) return;
      try {
        const response = await fetch(`${API_BASE}/notifications/read-all`, {
          method: 'PATCH',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error();
        showToast('Semua notifikasi ditandai dibaca');
        await fetchNotifications();
        await updateUnreadCount();
      } catch (err) {
        console.error('Failed to mark all notifications as read:', err);
      }
    }

    function startNotificationPolling() {
      if (notifInterval) clearInterval(notifInterval);
      updateUnreadCount();
      notifInterval = setInterval(() => {
        updateUnreadCount();
        if (document.getElementById('notif-dropdown').classList.contains('active')) {
          fetchNotifications();
        }
      }, 30000);
    }

    function stopNotificationPolling() {
      if (notifInterval) {
        clearInterval(notifInterval);
        notifInterval = null;
      }
      const badge = document.getElementById('notif-badge');
      if (badge) badge.style.display = 'none';
      const dropdown = document.getElementById('notif-dropdown');
      if (dropdown) dropdown.classList.remove('active');
    }

    // Auth check on startup
    async function checkAuth() {
      const token = localStorage.getItem('token');
      if (!token) {
        document.getElementById('app-shell').style.display = 'none';
        document.getElementById('login-page').style.display = 'flex';
        document.getElementById('profile-menu-btn').style.display = 'none';
        document.getElementById('notif-btn').style.display = 'none';
        stopNotificationPolling();
        lucide.createIcons();
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) {
          throw new Error('Session expired');
        }
        currentUser = await response.json();
        document.getElementById('profile-menu-btn').style.display = 'flex';
        document.getElementById('notif-btn').style.display = 'flex';
        startNotificationPolling();

        // Set profiles
        document.getElementById('profile-name').innerText = currentUser.fullname;
        document.getElementById('profile-role').innerText = currentUser.role;

        // Build navigation menu based on Role
        buildNavigation();

        // Show app shell with animation
        document.getElementById('login-page').style.display = 'none';
        const shell = document.getElementById('app-shell');
        shell.style.display = 'block';
        shell.style.opacity = '0';
        requestAnimationFrame(() => {
          shell.classList.add('entered');
          shell.style.opacity = '';
        });

        // Default page load
        loadView('dashboard');
      } catch (err) {
        localStorage.removeItem('token');
        document.getElementById('app-shell').style.display = 'none';
        document.getElementById('profile-menu-btn').style.display = 'none';
        document.getElementById('notif-btn').style.display = 'none';
        stopNotificationPolling();
        const lp = document.getElementById('login-page');
        lp.style.opacity = '1';
        lp.style.display = 'flex';
        showToast('Sesi telah habis, silakan masuk kembali', 'error');
        lucide.createIcons();
      }
    }

    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      try {

    // ── AI TOOLS: markdown helper ──────────────────────────────────────
    function renderMarkdown(md) {
      if (!md) return '';
      return md
        // Headings
        .replace(/^### (.+)$/gm, '<h4 style="font-size:14px;font-weight:700;color:var(--primary-dark);margin:16px 0 6px;">$1</h4>')
        .replace(/^## (.+)$/gm,  '<h3 style="font-size:15px;font-weight:700;color:var(--text-primary);margin:20px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px;">$1</h3>')
        .replace(/^# (.+)$/gm,   '<h2 style="font-size:17px;font-weight:700;color:var(--text-primary);margin:20px 0 8px;">$1</h2>')
        // Bold / italic
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,     '<em>$1</em>')
        // Bullet list (- or *)
        .replace(/^[-*] (.+)$/gm, '<li style="margin:4px 0;">$1</li>')
        // Wrap consecutive <li> in <ul>
        .replace(/(<li[^>]*>[\s\S]*?<\/li>)(?:\n?(<li))/g, '$1$2')
        // Line breaks
        .replace(/\n{2,}/g, '</p><p style="margin:8px 0;">')
        .replace(/\n/g, '<br>');
    }

    function wrapMdInBox(html, color = 'var(--background)', border = 'var(--border)') {
      // wrap consecutive <li> tags
      html = html.replace(/((<li[^>]*>.*?<\/li>\s*)+)/gs, '<ul style="padding-left:20px;margin:6px 0;">$1</ul>');
      return `<div style="background:${color};border:1px solid ${border};border-radius:10px;padding:20px;font-size:13px;line-height:1.9;color:var(--text-primary);"><p style="margin:0;">${html}</p></div>`;
    }

    async function runAiQuiz() {
      const text = document.getElementById('ai-quiz-input').value.trim();
      if (!text) { showToast('Masukkan teks materi terlebih dahulu.', 'error'); return; }
      aiSetLoading('ai-quiz-btn', 'ai-quiz-result', 'Generate Soal');
      try {
        const res = await fetch(`${API_BASE}/ai/quiz-generator`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
          body: JSON.stringify({ contentText: text })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Gagal generate soal');
        let html = '';
        const items = Array.isArray(data) ? data : (data.questions || []);
        if (items.length > 0) {
          html = `<div style="display:flex;flex-direction:column;gap:12px;">` + items.map((q, i) => `
            <div style="border:1px solid var(--border);border-radius:10px;padding:16px;background:var(--background);">
              <div style="display:flex;gap:10px;align-items:flex-start;">
                <span style="background:var(--primary);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;">${i+1}</span>
                <strong style="font-size:13px;color:var(--text-primary);line-height:1.5;">${q.question}</strong>
              </div>
              <div style="margin-top:12px;display:flex;flex-direction:column;gap:6px;padding-left:34px;">
                ${(q.options||[]).map((o, oi) => {
                  const isAnswer = o === q.answer;
                  const letters = ['A','B','C','D'];
                  return `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;background:${isAnswer ? '#dcfce7' : 'var(--surface)'};border:1px solid ${isAnswer ? '#86efac' : 'var(--border)'};">
                    <span style="font-weight:700;font-size:12px;color:${isAnswer ? '#16a34a' : 'var(--text-secondary)'};">${letters[oi]}</span>
                    <span style="font-size:13px;color:${isAnswer ? '#15803d' : 'var(--text-primary)'};">${o}</span>
                    ${isAnswer ? '<span style="margin-left:auto;font-size:11px;background:#16a34a;color:#fff;padding:2px 8px;border-radius:999px;">Jawaban ✓</span>' : ''}
                  </div>`;
                }).join('')}
              </div>
            </div>`).join('') + '</div>';
        } else {
          html = wrapMdInBox(`<pre style="font-size:12px;overflow:auto;">${JSON.stringify(data,null,2)}</pre>`);
        }
        document.getElementById('ai-quiz-result').innerHTML = html;
      } catch(e) { aiShowError('ai-quiz-result', e.message); }
      aiDoneLoading('ai-quiz-btn', '<i data-lucide="wand-2" style="width:15px;height:15px;"></i>', 'Generate Soal');
    }

    async function runUmmiAnalysis() {
      const studentId = document.getElementById('ai-ummi-student-id').value.trim();
      if (!studentId) { showToast('Masukkan ID Santri terlebih dahulu.', 'error'); return; }
      aiSetLoading('ai-ummi-btn', 'ai-ummi-result', 'Analisis Santri');
      try {
        const res = await fetch(`${API_BASE}/ai/ummi-analysis`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
          body: JSON.stringify({ studentId })
        });
        const data = await res.json();

    async function renderGamification(container) {
      container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);"><svg style="width:24px;height:24px;animation:spin 0.8s linear infinite;margin-bottom:8px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg><br>Memuat profil gamifikasi...</div>';
      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`${API_BASE}/users/${currentUser.id}/gamification`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Gagal memuat profil gamifikasi');
        const data = await res.json();
        
        const levels = [
          { name: 'Pemula', emoji: '🌱', min: 0, max: 100 },
          { name: 'Pembelajar', emoji: '📚', min: 100, max: 300 },
          { name: 'Rajin', emoji: '⭐', min: 300, max: 600 },
          { name: 'Teladan', emoji: '🏆', min: 600, max: 1000 },
          { name: 'Inspirasi', emoji: '💫', min: 1000, max: 999999 }
        ];

        const levelNum = data.level || 1;
        const currentLvl = levels[Math.min(levelNum - 1, levels.length - 1)];
        const nextLvl = levels[Math.min(levelNum, levels.length - 1)];

        let progressPct = 0;
        let xpText = '';
        if (levelNum >= 5) {
          progressPct = 100;
          xpText = `${data.xp} XP (Maksimum Level)`;
        } else {
          const currentProgress = data.xp - currentLvl.min;
          const range = currentLvl.max - currentLvl.min;
          progressPct = Math.min(100, Math.max(0, Math.round((currentProgress / range) * 100)));
          xpText = `${data.xp} / ${currentLvl.max} XP`;

        const badgesList = data.badges || [];

          ? `<p style="font-size:13px;color:var(--text-secondary);text-align:center;padding:20px;grid-column:1/-1;">Belum ada lencana yang diraih. Kerjakan tugas & hadir kelas untuk mendapatkannya!</p>`

        container.innerHTML = `

            <!-- HERO CARD -->
            <div style="background:linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);border-radius:16px;padding:28px;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.08);">

                  </div>
                </div>

      const btn = document.getElementById('claim-streak-btn');
      if (btn.disabled) return;
      btn.disabled = true;
      const originalHTML = btn.innerHTML;
      btn.innerHTML = '<svg style="width:12px;height:12px;animation:spin 0.8s linear infinite" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Mengklaim...';
      
      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`${API_BASE}/users/${currentUser.id}/claim-streak`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Gagal klaim streak');

        btn.innerHTML = originalHTML;
        lucide.createIcons();
      }
    }

    async function updateWaliDashboardChildInfo(studentId) {
      const token = localStorage.getItem('token');
      try {
        const cRes = await fetch(`${API_BASE}/classes?studentId=${studentId}`, { headers: { 'Authorization': `Bearer ${token}` } });
        const classes = cRes.ok ? await cRes.json() : [];
        
        const teacherEl = document.getElementById('summary-teacher-name');
        if (classes.length > 0 && classes[0].teacher) {
          teacherEl.innerText = classes[0].teacher.fullname;
        } else {
          teacherEl.innerText = 'Belum ditentukan';
        }

        const progRes = await fetch(`${API_BASE}/students/${studentId}/ummi-progress/latest`, { headers: { 'Authorization': `Bearer ${token}` } });
        const latestProg = progRes.ok ? await progRes.json() : null;

        const container = document.getElementById('wali-child-summary');
        const boxes = container.querySelectorAll('div[style*="text-align: center"]');
        if (boxes.length === 2) {
          boxes[0].querySelector('div[style*="font-size: 20px"]').innerText = latestProg ? latestProg.jilid : 'Jilid -';
          boxes[0].querySelector('div[style*="font-size: 13px"]').innerText = latestProg ? 'Halaman ' + latestProg.page : 'Belum Ada Progress';
          
          const badge = boxes[1].querySelector('.badge');
          badge.className = `badge ${latestProg && latestProg.status === 'Lulus' ? 'badge-success' : 'badge-warning'}`;
          badge.innerText = latestProg ? latestProg.status : 'Menunggu Evaluasi';
          
          boxes[1].querySelectorAll('div')[1].innerText = latestProg && latestProg.teacherNotes ? latestProg.teacherNotes : '-';
        }

        // Fetch child gamification info
        const gamificationRes = await fetch(`${API_BASE}/users/${studentId}/gamification`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (gamificationRes.ok) {
          const g = await gamificationRes.json();
          document.getElementById('wali-child-xp').innerText = g.xp;
          document.getElementById('wali-child-level').innerText = g.level;
          document.getElementById('wali-child-streak').innerText = g.streak;

          const badgesBox = document.getElementById('wali-child-badges');
          badgesBox.innerHTML = g.badges.map(b => `
            <span class="badge badge-success" style="display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; font-size: 11px;" title="${b.description}">
              <i data-lucide="${b.icon}" style="width: 12px; height: 12px;"></i>
              ${b.badgeName}
            </span>
          `).join('') || '<span style="color: var(--text-secondary); font-style: italic;">Belum ada lencana.</span>';
          lucide.createIcons();
        }
      } catch (err) {
        console.error('Gagal mengupdate info wali dashboard:', err);
      }
    }

      if (role === 'WALI') return 'badge-warning';

    function showAddUserModal() {
      const fields = `
        <div class="form-group">
          <label>Nama Lengkap</label>
          <input type="text" name="fullname" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Email (Kosongkan jika Santri tidak punya)</label>
          <input type="email" name="email" class="form-control">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select name="role" class="form-control" required>
            <option value="SANTRI">SANTRI</option>

            <option value="WALI">WALI</option>
            <option value="ADMIN">ADMIN</option>
          </select>
        </div>
      `;

      openModal('Tambah Pengguna Baru', fields, async (data) => {
        const token = localStorage.getItem('token');
        try {
          const res = await fetch(`${API_BASE}/users`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(data)
          });
          if (!res.ok) throw new Error('Gagal menyimpan pengguna');
          showToast('Pengguna berhasil ditambahkan!');
          closeModal();
          loadView('users');
        } catch (err) {
          showToast(err.message, 'error');
        }
      });

    async function showAssignWaliModal() {
      const token = localStorage.getItem('token');
      const uRes = await fetch(`${API_BASE}/users`, { headers: { 'Authorization': `Bearer ${token}` } });
      const users = await uRes.ok ? await uRes.json() : [];

      const walis = users.filter(u => u.role === 'WALI');
      const santris = users.filter(u => u.role === 'SANTRI');

      const waliOptions = walis.map(w => `<option value="${w.id}">${w.fullname}</option>`).join('');
      const santriOptions = santris.map(s => `<option value="${s.id}">${s.fullname}</option>`).join('');

      const fields = `
        <div class="form-group">
          <label>Pilih Wali Santri</label>
          <select name="parentId" class="form-control" required>
            ${waliOptions || '<option disabled>Buat wali dulu</option>'}
          </select>
        </div>
        <div class="form-group">
          <label>Pilih Anak (Santri)</label>
          <select name="studentId" class="form-control" required>
            ${santriOptions || '<option disabled>Buat santri dulu</option>'}
          </select>
        </div>
      `;

      openModal('Hubungkan Wali dan Santri', fields, async (data) => {
        try {
          const res = await fetch(`${API_BASE}/users/${data.parentId}/children/${data.studentId}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
          });

    async function showAddStudentToClassModal(classId) {
      const token = localStorage.getItem('token');
      try {
        // Fetch all students (role=SANTRI)
        const res = await fetch(`${API_BASE}/users?role=SANTRI&scope=all`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Gagal mengambil daftar santri');
        const students = await res.json();

        // Get current class details to filter out already added students
        const classRes = await fetch(`${API_BASE}/classes/${classId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const currentClass = await classRes.json();
        const currentStudentIds = new Set((currentClass.students || []).map(s => s.id));

        const availableStudents = students.filter(s => !currentStudentIds.has(s.id));

        if (availableStudents.length === 0) {
          showToast('Semua santri yang terdaftar di sistem sudah ditambahkan ke kelas ini.', 'warning');
          return;
        }

        const optionsHTML = availableStudents.map(s => `
          <option value="${s.id}">${s.fullname} (${s.email || 'tanpa email'})</option>
        `).join('');

        const fieldsHTML = `
          <div class="form-group">
            <label>Pilih Santri</label>
            <select name="studentId" class="form-control" required style="width: 100%;">
              <option value="">-- Pilih Santri --</option>
              ${optionsHTML}
            </select>
          </div>
        `;

        openModal('Tambah Santri ke Kelas', fieldsHTML, async (data) => {
          try {
            const addRes = await fetch(`${API_BASE}/classes/${classId}/students/${data.studentId}`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
              }
            });
            if (!addRes.ok) {
              const err = await addRes.json();
              throw new Error(err.message || 'Gagal menambahkan santri');
            }
            showToast('Santri berhasil ditambahkan ke kelas!');
            closeModal();
            viewClassDetail(classId);
          } catch (err) {
            showToast(err.message, 'error');
          }
        });
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function fetchAndRenderMaterials(classId, search = '', folderPath = '') {
      const token = localStorage.getItem('token');
      const tableCard = document.getElementById('materials-table-card');
      if (!tableCard) return;

      try {
        let url = `${API_BASE}/classes/${classId}/materials?`;
        if (search) url += `search=${encodeURIComponent(search)}&`;
        if (folderPath) url += `folderPath=${encodeURIComponent(folderPath)}`;

        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
        const materials = await res.json();

        let rows = materials.map(m => {
          const tagsBadges = m.tags ? m.tags.split(',').map(t => `<span class="badge badge-info" style="font-size: 11px;">#${t.trim()}</span>`).join(' ') : '';
          const folderBadge = m.folderPath ? `<span class="badge badge-secondary" style="font-size: 11px; font-weight: 600;">📁 ${m.folderPath}</span>` : '';

          return `
            <tr>
              <td>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                  <strong>${m.title}</strong>
                  <div style="display: flex; gap: 6px; flex-wrap: wrap;">
                    ${folderBadge}
                    ${tagsBadges}
                  </div>
                </div>
              </td>
              <td>${m.description || '-'}</td>
              <td>${(m.fileSize / (1024 * 1024)).toFixed(2)} MB</td>
              <td>
                <div style="display: flex; gap: 6px;">
                  <a href="${API_BASE}/materials/${m.id}/download" class="btn btn-secondary" style="padding: 4px 8px; font-size: 12px;"><i data-lucide="download" style="width: 14px; height: 14px;"></i> Unduh</a>
                  ${currentUser.role === 'ADMIN' || currentUser.role === 'GURU' ? `
                    <button class="btn btn-danger" style="padding: 4px 8px; font-size: 12px;" onclick="deleteMaterial('${classId}', '${m.id}')">Hapus</button>
                  ` : ''}
                </div>
              </td>
            </tr>
          `;
        }).join('');

        tableCard.innerHTML = `
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Judul / Folder / Tags</th>
                  <th>Deskripsi</th>
                  <th>Ukuran File</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody>
                ${rows || '<tr><td colspan="4" style="text-align: center;">Belum ada materi pelajaran yang cocok.</td></tr>'}
              </tbody>
            </table>
          </div>
        `;
        lucide.createIcons();
      } catch (err) {
        tableCard.innerHTML = '<div class="badge badge-danger">Gagal memuat materi pelajaran.</div>';
      }
    }

          const currentRecommendations = latest ? latest.recommendations || '' : '';
          const currentTarget = latest ? latest.targetPage || '' : '';

          return `

              <td>
                <select class="form-control field-jilid" style="width: auto; font-size: 13px; padding: 4px 8px;">

                  <option value="Jilid 2" ${currentJilid === 'Jilid 2' ? 'selected' : ''}>Jilid 2</option>

    async function submitBulkProgress(classId) {
      const token = localStorage.getItem('token');
      const rows = document.querySelectorAll('.bulk-progress-row');
      const records = [];

      rows.forEach(row => {
        const studentId = row.getAttribute('data-student-id');
        const jilid = row.querySelector('.field-jilid').value;
        const page = parseInt(row.querySelector('.field-page').value);
        const status = row.querySelector('.field-status').value;
        const teacherNotes = row.querySelector('.field-notes').value;
        const mistakeDetails = row.querySelector('.field-mistakes').value;
        const recommendations = row.querySelector('.field-recs').value;
        const targetVal = row.querySelector('.field-target').value;
        const targetPage = targetVal ? parseInt(targetVal) : undefined;

        records.push({
          studentId,
          jilid,
          page,
          status,
          teacherNotes,
          mistakeDetails,
          recommendations,
          targetPage
        });
      });

      try {
        const res = await fetch(`${API_BASE}/classes/${classId}/bulk-progress`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ records })
        });

        if (res.ok) {
          showToast('Progress Massal berhasil disimpan!');
          viewClassDetail(classId);
        } else {
          showToast('Gagal menyimpan progress massal', 'error');
        }
      } catch (err) {
        showToast('Koneksi internet bermasalah', 'error');
      }
    }

    async function showCreateAssignmentModal(classId, className) {
      const token = localStorage.getItem('token');
      
      let templates = [];
      try {
        const tRes = await fetch(`${API_BASE}/templates`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (tRes.ok) templates = await tRes.json();
      } catch (err) {
        console.error('Gagal mengambil template tugas:', err);
      }

      let templateOptions = '<option value="">-- Pilih Template (Opsional) --</option>';
      templateOptions += templates.map(t => `<option value="${t.id}">${t.title}</option>`).join('');

      const fields = `
        <div class="form-group">
          <label>Pilih dari Template</label>
          <select id="select-assignment-template" class="form-control" style="font-size: 13px;">
            ${templateOptions}
          </select>
        </div>
        <div class="form-group">
          <label>Judul Tugas</label>
          <input type="text" name="title" id="assignment-title-input" class="form-control" required>

          <input type="datetime-local" name="dueDate" class="form-control" required>

        try {

            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(data)
          });
          if (!res.ok) throw new Error('Gagal');
          showToast('Tugas berhasil ditambahkan!');
          closeModal();
          showClassAssignments(classId, className);
        } catch (err) {
          showToast(err.message, 'error');

          document.getElementById('assignment-title-input').value = matched.title;

          </div>
        </div>
      `;

      const searchInput = document.getElementById('docs-search-input');

      filterAndRenderDocsList('');

        filterAndRenderDocsList(searchInput.value.toLowerCase());

    function filterAndRenderDocsList(query) {
      const listContainer = document.getElementById('docs-list-container');
      if (!listContainer) return;
      listContainer.innerHTML = '';

      // Filter articles
      const filtered = DOCS_ARTICLES.filter(art => 
        art.title.toLowerCase().includes(query) || 
        art.content.toLowerCase().includes(query) ||
        art.category.toLowerCase().includes(query)
      );

      // Group by category
      const groups = {};
      filtered.forEach(art => {
        if (!groups[art.category]) groups[art.category] = [];
        groups[art.category].push(art);
      });

      const categories = Object.keys(groups);
      if (categories.length === 0) {
        listContainer.innerHTML = '<div style="font-size: 13px; color: var(--text-secondary); text-align: center; padding: 12px;">Tidak ditemukan panduan.</div>';
        return;
      }

      categories.forEach(cat => {
        const catDiv = document.createElement('div');
        catDiv.innerHTML = `
          <h4 style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 6px; border-bottom: 1px dashed var(--border); padding-bottom: 2px;">${cat}</h4>
          <div style="display: flex; flex-direction: column; gap: 4px;">
            ${groups[cat].map(art => `
              <a href="#" class="doc-link-item" data-art-id="${art.id}" style="display: block; padding: 8px 12px; font-size: 13px; font-weight: 500; color: var(--text-primary); text-decoration: none; border-radius: var(--rounded-md); transition: all 0.2s;">
                ${art.title}
              </a>
            `).join('')}
          </div>
        `;
        listContainer.appendChild(catDiv);
      });

      // Bind link clicks
      document.querySelectorAll('.doc-link-item').forEach(el => {
        el.onclick = (e) => {
          e.preventDefault();
          document.querySelectorAll('.doc-link-item').forEach(link => {
            link.style.background = 'none';
            link.style.color = 'var(--text-primary)';
          });
          el.style.background = 'var(--primary-light)';
          el.style.color = 'var(--primary-dark)';

    // --- GAME EDUKASI ENGINE ---
    let audioCtx = null;
    function playBeep(freq, type, duration) {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    // --- GAME STAGE 1: MAKHRAJ POP ---
    function launchStage1(playArea, pageContainer) {
      const targets = [
        { desc: "Tenggorokan Bawah (Al-Halq): Hamzah & Ha'", correct: ['أ', 'هـ'], pool: ['أ', 'هـ', 'ب', 'ت', 'ج', 'د', 'ر'] },
        { desc: "Kedua Bibir (Al-Syafatain): Ba', Mim, Wau, Fa'", correct: ['ب', 'م', 'و', 'ف'], pool: ['ب', 'م', 'و', 'ف', 'س', 'ش', 'ص'] },
        { desc: "Ujung Lidah bertemu Pangkal Gigi Atas: Ta', Dal, Tho", correct: ['ت', 'd', 'ط'], pool: ['ت', 'd', 'ط', 'ع', 'ح', 'خ', 'ل'] },
        { desc: "Tenggorokan Atas (Al-Halq): Ghoin & Kho'", correct: ['غ', 'kh'], pool: ['غ', 'kh', 'ع', 'ح', 'م', 'ن', 'و'] }

      const currentTarget = targets[Math.floor(Math.random() * targets.length)];
      let score = 0;
      let lives = 3;
      let gameInterval = null;

      playArea.innerHTML = `
        <div class="card" style="padding: 24px; position: relative; overflow: hidden; background: var(--surface);">
          <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 16px;">

          <div style="text-align: center; background: var(--primary-light); padding: 12px; border-radius: 8px; margin-bottom: 16px; border: 1px solid var(--primary-light);">

            <!-- Balloons will spawn here -->
          </div>
        </div>
      `;

      const canvas = document.getElementById('stage1-canvas');

      function spawnBalloon() {
        if (lives <= 0 || score >= 100) return;

        const letter = currentTarget.pool[Math.floor(Math.random() * currentTarget.pool.length)];
        const isCorrect = currentTarget.correct.includes(letter);

        const balloon = document.createElement('div');
        balloon.className = 'balloon-object';
        balloon.innerText = letter;
        
        // Random style colors
        const colors = ['#f43f5e', '#ec4899', '#8b5cf6', '#3b82f6', '#10b981', '#f59e0b'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        
        Object.assign(balloon.style, {
          position: 'absolute',
          bottom: '-60px',
          left: Math.random() * 80 + 10 + '%',
          width: '52px',
          height: '64px',
          borderRadius: '50% 50% 50% 50% / 40% 40% 60% 60%',
          background: randomColor,
          color: '#fff',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          fontSize: '22px',
          fontWeight: '800',
          cursor: 'pointer',
          boxShadow: 'inset -6px -6px 12px rgba(0,0,0,0.15), 0 4px 10px rgba(0,0,0,0.1)',
          transition: 'transform 4.5s linear, opacity 0.2s ease',
        });

        // String tail
        const tail = document.createElement('div');
        Object.assign(tail.style, {
          position: 'absolute',
          bottom: '-12px',
          left: '25px',
          width: '2px',
          height: '14px',
          background: 'rgba(0,0,0,0.2)'
        });
        balloon.appendChild(tail);

        canvas.appendChild(balloon);

        // Animate climbing up using microtasks
        setTimeout(() => {
          balloon.style.transform = 'translateY(-400px)';
        }, 50);

        balloon.onclick = () => {
          if (balloon.classList.contains('popped')) return;
          balloon.classList.add('popped');
          
          if (isCorrect) {
            playBeep(660, 'sine', 0.1);
            setTimeout(() => playBeep(880, 'sine', 0.15), 80);
            score += 20;
            document.getElementById('game-score').innerText = score;
            balloon.style.opacity = '0';
            setTimeout(() => balloon.remove(), 200);

            if (score >= 100) {
              endGame(true);
            }
          } else {
            playBeep(220, 'sawtooth', 0.25);
            lives--;
            updateHearts();
            balloon.style.opacity = '0';
            setTimeout(() => balloon.remove(), 200);

            if (lives <= 0) {
              endGame(false);
            }
          }
        };

        // Remove when offscreen
        setTimeout(() => {
          if (balloon.parentNode) {
            if (isCorrect && !balloon.classList.contains('popped')) {
              // Missed correct balloon
              lives--;
              updateHearts();
              playBeep(220, 'sawtooth', 0.25);
              if (lives <= 0) {
                endGame(false);
              }
            }
            balloon.remove();
          }
        }, 4600);
      }

      function updateHearts() {
        const hearts = '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, 3 - lives));
        document.getElementById('game-lives').innerText = hearts;
      }

      function endGame(isWin) {
        clearInterval(gameInterval);
        canvas.innerHTML = '';
        
        if (isWin) {
          playBeep(880, 'sine', 0.15);
          setTimeout(() => playBeep(1200, 'sine', 0.3), 150);

              <button class="btn btn-primary" onclick="launchGame(1, ${pageContainer.id})" style="margin: 0 auto;">Coba Lagi</button>
            </div>
          `;
        }
      }

      gameInterval = setInterval(spawnBalloon, 1500);
    }

    // --- GAME STAGE 3: GHARIB EXPLORER ---
    function launchStage3(playArea, pageContainer) {
      const steps = [
        {

        {

          options: [
            { text: "Bisyalismu", correct: false },
            { text: "Majreha", correct: true },
            { text: "A-a'jamiyyu", correct: false }
          ]
        },
        {

            { text: "Saktah", correct: false },
            { text: "Laa ta'mannaa", correct: true },
