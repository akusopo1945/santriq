      let currentStep = 0;

      function renderStep() {
        if (currentStep >= steps.length) {
          endGame(true);
          return;
        }

        const step = steps[currentStep];

        playArea.innerHTML = `
          <div class="card" style="padding: 24px; background: var(--surface);">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 16px;">
              <strong style="color: var(--primary);">Stage 3: Gharib Explorer</strong>
              <span style="font-weight: 700; color: var(--success);">Rintangan: ${currentStep + 1}/3</span>
            </div>

            <!-- RPG sprite walk simulator representation -->
            <div style="height: 120px; background: linear-gradient(180deg, #10b981 0%, #047857 100%); border-radius: 12px; display: flex; align-items: center; justify-content: space-around; margin-bottom: 24px; position: relative; border: 1px solid var(--border);">
              <div style="font-size: 36px; transition: transform 0.8s ease; transform: translateX(${currentStep * 40}px);">🧙‍♂️</div>
              <div style="font-size: 36px;">🚪</div>
            </div>
            
            <div style="background: var(--background); padding: 18px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border);">
              <h4 style="color: var(--text-primary); font-size: 14.5px; line-height: 1.5; font-weight: 700;">
                ${step.question}
              </h4>
            </div>

            <!-- Options -->
            <div style="display: flex; flex-direction: column; gap: 12px;">
              ${step.options.map((opt, i) => `
                <button class="btn btn-secondary option-btn" data-correct="${opt.correct}" style="width: 100%; justify-content: flex-start; padding: 14px 18px; text-align: left; font-size: 13.5px; font-weight: 600;">
                  ${i + 1}. ${opt.text}
                </button>
              `).join('')}
            </div>
          </div>
        `;

        document.querySelectorAll('.option-btn').forEach(btn => {
          btn.onclick = () => {
            const isCorrect = btn.getAttribute('data-correct') === 'true';
            if (isCorrect) {
              playBeep(660, 'sine', 0.1);
              setTimeout(() => playBeep(880, 'sine', 0.15), 80);
              currentStep++;
              renderStep();
            } else {
              playBeep(150, 'sawtooth', 0.4);
              showToast('Jawaban salah! Anda terhalang rintangan.', 'error');
              currentStep = 0; // Reset progress on fail
              renderStep();
            }
          };
        });
      }

      function endGame(isWin) {
        if (isWin) {
          playBeep(880, 'sine', 0.15);
          setTimeout(() => playBeep(1200, 'sine', 0.3), 150);
          submitGameCompletion(3, playArea, pageContainer);
        }
      }

      renderStep();
    }

    async function submitGameCompletion(stageNum, playArea, pageContainer) {
      playArea.innerHTML = `
        <div class="card" style="text-align: center; padding: 40px; background: var(--surface);">
          <svg style="width:24px;height:24px;animation:spin 0.8s linear infinite;margin-bottom:8px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          <br>Mengirim hasil permainan ke server...
        </div>
      `;

      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`${API_BASE}/users/${currentUser.id}/complete-stage`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ stage: stageNum })
        });

        if (!res.ok) throw new Error('Gagal menyimpan progress game');
        const result = await res.json();

        const xpGainedText = result.xpGained > 0 ? `<span style="color: var(--success); font-weight:800;">+${result.xpGained} XP!</span>` : 'Progress Tersimpan!';

        playArea.innerHTML = `
          <div class="card" style="text-align: center; padding: 40px; background: var(--surface); border: 1px solid var(--border);">
            <div style="font-size: 48px; margin-bottom: 16px;">🏆</div>
            <h3 style="color: var(--success); margin-bottom: 8px;">Selamat! Anda Menyelesaikan Stage ${stageNum}</h3>
            <p style="font-size: 13.5px; color: var(--text-secondary); margin-bottom: 24px;">
              Anda mendapatkan ${xpGainedText}
            </p>
            <button class="btn btn-primary" id="game-congrats-close-btn" style="margin: 0 auto;">Lanjutkan Petualangan</button>
          </div>
        `;

        document.getElementById('game-congrats-close-btn').onclick = () => {
          renderMiniGame(pageContainer);
        };
      } catch (err) {
        showToast(err.message, 'error');
        playArea.innerHTML = `
          <div class="card" style="text-align: center; padding: 40px; background: var(--surface); border: 1px solid var(--border);">
            <h3 style="color: var(--danger); margin-bottom: 12px;">Kesalahan Koneksi</h3>
            <p style="font-size: 13.5px; color: var(--text-secondary); margin-bottom: 24px;">Progress game Anda gagal disimpan ke server.</p>
            <button class="btn btn-primary" onclick="renderMiniGame(${pageContainer.id})" style="margin: 0 auto;">Kembali</button>
          </div>
        `;
      }
    }

    // 5. THEME TOGGLER WITH VIEW TRANSITION CIRCULAR REVEAL
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-theme');
      }
      updateThemeIcon();
    }

    function initSidebar() {
      const shell = document.getElementById('app-shell');
      const toggleBtn = document.getElementById('sidebar-toggle-btn');
      const toggleIcon = document.getElementById('sidebar-toggle-icon');
      if (!shell || !toggleBtn || !toggleIcon) return;

      const savedState = localStorage.getItem('sidebar-collapsed');
      if (savedState === 'true') {
        shell.classList.add('sidebar-collapsed');
        toggleIcon.setAttribute('data-lucide', 'chevron-right');
      } else {
        shell.classList.remove('sidebar-collapsed');
        toggleIcon.setAttribute('data-lucide', 'chevron-left');
      }
      lucide.createIcons();

      toggleBtn.onclick = () => {
        const isCollapsed = shell.classList.toggle('sidebar-collapsed');
        localStorage.setItem('sidebar-collapsed', isCollapsed ? 'true' : 'false');
        if (isCollapsed) {
          toggleIcon.setAttribute('data-lucide', 'chevron-right');
        } else {
          toggleIcon.setAttribute('data-lucide', 'chevron-left');
        }
        lucide.createIcons();
      };
    }

    function updateThemeIcon() {
      const icon = document.getElementById('theme-icon');
      if (!icon) return;
      if (document.body.classList.contains('dark-theme')) {
        icon.setAttribute('data-lucide', 'moon');
      } else {
        icon.setAttribute('data-lucide', 'sun');
      }
      lucide.createIcons();
    }

    function toggleTheme(e) {
      const isDark = document.body.classList.contains('dark-theme');
      
      // Fallback if View Transitions API is not supported
      if (!document.startViewTransition) {
        document.body.classList.toggle('dark-theme');
        localStorage.setItem('theme', !isDark ? 'dark' : 'light');
        updateThemeIcon();
        return;
      }

      // Calculate transition origin (top-right click or screen corner)
      const x = e ? e.clientX : window.innerWidth;
      const y = e ? e.clientY : 0;
      
      const endRadius = Math.hypot(
        Math.max(x, window.innerWidth - x),
        Math.max(y, window.innerHeight - y)
      );

      const transition = document.startViewTransition(() => {
        document.body.classList.toggle('dark-theme');
        localStorage.setItem('theme', !isDark ? 'dark' : 'light');
        updateThemeIcon();
      });

      transition.ready.then(() => {
        const clipPath = [
          `circle(0px at ${x}px ${y}px)`,
          `circle(${endRadius}px at ${x}px ${y}px)`
        ];
        
        document.documentElement.animate(
          {
            clipPath: isDark ? [...clipPath].reverse() : clipPath,
          },
          {
            duration: 400,
            easing: 'ease-in-out',
            pseudoElement: isDark
              ? '::view-transition-old(root)'
              : '::view-transition-new(root)',
          }
        );
      });
    }

    document.getElementById('theme-toggle').onclick = (e) => toggleTheme(e);

    // Notification dropdown toggle
    document.getElementById('notif-btn').onclick = (e) => {
      e.stopPropagation();
      const dropdown = document.getElementById('notif-dropdown');
      const profileDropdown = document.getElementById('profile-dropdown');
      if (profileDropdown) profileDropdown.classList.remove('active');
      
      const isActive = dropdown.classList.toggle('active');
      if (isActive) {
        fetchNotifications();
      }
    };

    // Profile dropdown toggle
    document.getElementById('profile-menu-btn').onclick = (e) => {
      e.stopPropagation();
      const dropdown = document.getElementById('profile-dropdown');
      const notifDropdown = document.getElementById('notif-dropdown');
      if (notifDropdown) notifDropdown.classList.remove('active');

      const isActive = dropdown.classList.toggle('active');
      if (isActive) {
        showProfileDropdown();
      }
    };

    // Close dropdowns on click outside
    document.addEventListener('click', (e) => {
      const notifDropdown = document.getElementById('notif-dropdown');
      const notifBtn = document.getElementById('notif-btn');
      if (notifDropdown && !notifDropdown.contains(e.target) && e.target !== notifBtn && !notifBtn.contains(e.target)) {
        notifDropdown.classList.remove('active');
      }

      const profileDropdown = document.getElementById('profile-dropdown');
      const profileBtn = document.getElementById('profile-menu-btn');
      if (profileDropdown && !profileDropdown.contains(e.target) && e.target !== profileBtn && !profileBtn.contains(e.target)) {
        profileDropdown.classList.remove('active');
      }
    });

    // Mark all as read click handler
    document.getElementById('notif-read-all-btn').onclick = (e) => {
      e.stopPropagation();
      markAllNotificationsAsRead();
    };

    // --- PROFILE DROPDOWN ENGINE ---
    async function showProfileDropdown() {
      const dropdown = document.getElementById('profile-dropdown');
      if (!dropdown) return;

      dropdown.innerHTML = `
        <div style="text-align: center; padding: 20px; color: var(--text-secondary);">
          <svg style="width:20px;height:20px;animation:spin 0.8s linear infinite;margin:0 auto 8px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          Memuat...
        </div>
      `;

      const token = localStorage.getItem('token');
      try {
        let gamification = null;
        if (currentUser.role === 'SANTRI') {
          const res = await fetch(`${API_BASE}/users/${currentUser.id}/gamification`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (res.ok) {
            gamification = await res.json();
          }
        }

        const initials = currentUser.fullname.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        
        let extraStatsHTML = '';
        if (currentUser.role === 'SANTRI' && gamification) {
          const levels = [
            { name: 'Pemula', emoji: '🌱', min: 0, max: 100 },
            { name: 'Pembelajar', emoji: '📚', min: 100, max: 300 },
            { name: 'Rajin', emoji: '⭐', min: 300, max: 600 },
            { name: 'Teladan', emoji: '🏆', min: 600, max: 1000 },
            { name: 'Inspirasi', emoji: '💫', min: 1000, max: 999999 }
          ];
          const levelNum = gamification.level || 1;
          const currentLvl = levels[Math.min(levelNum - 1, levels.length - 1)];
          const progressPct = levelNum >= 5 ? 100 : Math.min(100, Math.max(0, Math.round(((gamification.xp - currentLvl.min) / (currentLvl.max - currentLvl.min)) * 100)));

          extraStatsHTML = `
            <div style="background: var(--background); border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: flex; flex-direction: column; gap: 8px;">
              <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); font-weight: 700;">
                <span>Progresi Level ${levelNum} (${currentLvl.name})</span>
                <span>${gamification.xp} XP</span>
              </div>
              <div style="height: 6px; background: var(--border); border-radius: 999px; overflow: hidden;">
                <div style="height: 100%; width: ${progressPct}%; background: var(--primary); border-radius: 999px;"></div>
              </div>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; text-align: center;">
                <div style="border-right: 1px solid var(--border); padding-right: 4px;">
                  <span style="font-size: 10px; color: var(--text-secondary); display: block; text-transform: uppercase;">Streak</span>
                  <strong style="font-size: 13px; color: var(--primary-dark);">🔥 ${gamification.streak || 0} Hari</strong>
                </div>
                <div>
                  <span style="font-size: 10px; color: var(--text-secondary); display: block; text-transform: uppercase;">Lencana</span>
                  <strong style="font-size: 13px; color: var(--secondary);">🏅 ${(gamification.badges || []).length}</strong>
                </div>
              </div>
            </div>
            
            <div style="text-align: center; margin-top: 8px;">
              <svg width="84" height="84" viewBox="0 0 36 36" style="margin: 0 auto; display: block;">
                <path style="fill: none; stroke: var(--border); stroke-width: 3.5;" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <path style="fill: none; stroke: var(--primary); stroke-width: 3.5; stroke-dasharray: ${progressPct}, 100; stroke-linecap: round;" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <text x="18" y="20.35" style="font-size: 8px; font-weight: 700; fill: var(--text-primary); text-anchor: middle; font-family: var(--font-body);">${progressPct}%</text>
              </svg>
              <span style="font-size: 10px; color: var(--text-secondary); display: block; margin-top: 4px;">XP Target Capaian</span>
            </div>
          `;
        } else {
          extraStatsHTML = `
            <div style="background: var(--background); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px;">
              <i data-lucide="shield-check" style="width: 22px; height: 22px; color: var(--primary);"></i>
              <strong style="font-size: 13px; color: var(--text-primary); display: block;">Akun Terverifikasi</strong>
              <span style="font-size: 11px; color: var(--text-secondary);">Peran Sistem: ${currentUser.role}</span>
            </div>
          `;
        }

        dropdown.innerHTML = `
          <div style="display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px;">
            <div style="width: 44px; height: 44px; border-radius: 50%; background: var(--primary-light); color: var(--primary-dark); font-weight: 800; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 2px solid var(--primary);">
              ${initials}
            </div>
            <div style="overflow: hidden; flex: 1;">
              <h4 style="margin: 0; font-size: 13.5px; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${currentUser.fullname}</h4>
              <p style="margin: 2px 0 0; font-size: 11px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${currentUser.email || ''}</p>
            </div>
          </div>

          <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px;">
            ${extraStatsHTML}
          </div>

          <div style="display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--border); padding-top: 12px;">
            <button class="btn btn-secondary" id="dropdown-settings-btn" style="width: 100%; justify-content: center; padding: 10px; font-size: 12.5px;">
              <i data-lucide="settings" style="width: 14px; height: 14px;"></i> Pengaturan Akun
            </button>
            <button class="btn btn-secondary" id="dropdown-logout-btn" style="width: 100%; justify-content: center; padding: 10px; font-size: 12.5px; border-color: var(--danger); color: var(--danger);">
              <i data-lucide="log-out" style="width: 14px; height: 14px;"></i> Keluar Sesi
            </button>
          </div>
        `;
        lucide.createIcons();

        document.getElementById('dropdown-settings-btn').onclick = (e) => {
          e.stopPropagation();
          dropdown.classList.remove('active');
          openAccountSettingsModal();
        };

        document.getElementById('dropdown-logout-btn').onclick = (e) => {
          e.stopPropagation();
          dropdown.classList.remove('active');
          document.getElementById('logout-btn').click();
        };

      } catch (err) {
        dropdown.innerHTML = `<div style="color: var(--danger); font-size: 12px; text-align: center; padding: 10px;">Gagal memuat profil: ${err.message}</div>`;
      }
    }

    function openAccountSettingsModal() {
      const fieldsHTML = `
        <div class="form-group">
          <label>Nama Lengkap</label>
          <input type="text" name="fullname" class="form-control" value="${currentUser.fullname}" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" class="form-control" value="${currentUser.email || ''}" required>
        </div>
        <div style="border-top: 1px dashed var(--border); margin: 16px 0; padding-top: 16px;">
          <h4 style="font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px;">Ganti Password (Opsional)</h4>
          <div class="form-group">
            <label>Password Lama</label>
            <input type="password" name="oldPassword" class="form-control" placeholder="••••••••">
          </div>
          <div class="form-group">
            <label>Password Baru</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••">
          </div>
        </div>
      `;
      openModal('Pengaturan Akun', fieldsHTML, async (data) => {
        if (!data.password) {
          delete data.password;
          delete data.oldPassword;
        }
        const token = localStorage.getItem('token');
        try {
          const res = await fetch(`${API_BASE}/users/${currentUser.id}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(data)
          });
          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.message || 'Gagal memperbarui profil');
          }
          showToast('Profil berhasil diperbarui!');
          closeModal();
          currentUser = await res.json();
          document.getElementById('profile-name').innerText = currentUser.fullname;
          document.getElementById('profile-role').innerText = currentUser.role;
        } catch (err) {
          showToast(err.message, 'error');
        }
      });
    }

    // Splash screen controller
    function runSplash(onDone) {
      const bar   = document.getElementById('splash-bar');
      const steps = [15, 35, 60, 80, 95, 100];
      let i = 0;
      const tick = () => {
        if (i < steps.length) {
          bar.style.width = steps[i] + '%';
          i++;
          setTimeout(tick, i < 4 ? 180 : 120);
        } else {
          // Done – fade out splash
          const splash = document.getElementById('splash-screen');
          splash.classList.add('hide');
          setTimeout(() => {
            splash.style.display = 'none';
            onDone();
          }, 520);
        }
      };
      setTimeout(tick, 200);
    }

    // Startup check
    window.onload = async () => {
      initTheme();
      initSidebar();
      // Hide login & app shell during splash
      document.getElementById('login-page').style.display  = 'none';
      document.getElementById('app-shell').style.display   = 'none';
      await loadSystemSettings();
      runSplash(() => checkAuth());
    };
  </script>
</body>
</html>
